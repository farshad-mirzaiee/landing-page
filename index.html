<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odin</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="logo">
                <img src="./images/logo.png" alt="odin-logo">
            </div>

            <nav class="nav">
                <ul class="nav-links">
                    <li><a href="#">Wisdom</a></li>
                    <li><a href="#">Mythology</a></li>
                    <li><a href="#">Legends</a></li>
                </ul>
            </nav>
        </div>

        <div class="hero">
            <div class="hero-text">
                <h1>Odin, the Allfather</h1>
                <p>
                    Ruler of Asgard and seeker of knowledge, Odin sacrificed much in his pursuit of wisdom.
                    From the roots of Yggdrasil to the halls of Valhalla, his influence shapes the realms.
                </p>
                <button>Explore the legends</button>
            </div>

            <div class="hero-image">
                <img src="./images/Hero.png" alt="Odin illustration">
            </div>
        </div>
    </header>

</html>
